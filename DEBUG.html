<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>机器人UI调试</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #1a1a2e; color: white; }
    .test-seat {
      width: 120px;
      height: 120px;
      border: 2px solid #667eea;
      border-radius: 10px;
      position: relative;
      margin: 10px;
      display: inline-block;
      background: rgba(102, 126, 234, 0.1);
    }
    .seat-add-bot {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: 2px solid #667eea;
      background: rgba(102, 126, 234, 0.2);
      color: #667eea;
      font-size: 32px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .seat-add-bot:hover {
      background: rgba(102, 126, 234, 0.4);
      transform: translate(-50%, -50%) scale(1.1);
    }
    #log { 
      margin-top: 20px; 
      padding: 10px; 
      background: #0f0f1e;
      border-radius: 5px;
      font-family: monospace;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <h1>🧪 座位加号按钮测试</h1>
  
  <div class="test-seat" id="seat1">
    <button class="seat-add-bot" onclick="testClick()">+</button>
  </div>
  
  <div id="log"></div>
  
  <script>
    function testClick() {
      const log = document.getElementById('log');
      log.innerHTML += `<div>✅ ${new Date().toLocaleTimeString()} - 按钮点击成功!</div>`;
      alert('加号按钮工作正常!');
    }
    
    console.log('测试页面加载完成');
  </script>
</body>
</html>
